<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Float Layout</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page">
        <h1>Float Layout</h1>

        <section class="example example-one">
            <div class="block left">1</div>
            <div class="block right">2</div>
        </section>

        <section class="example example-two">
            <div class="block left">1</div>

            <div class="block right">4</div>
            <div class="block right">3</div>
            <div class="block right">2</div>
        </section>

        <section class="example example-three">
            <div class="block left">1</div>
            <div class="block left">2</div>

            <div class="block right">4</div>
            <div class="block right">3</div>
        </section>

        <section class="example example-four">
            <div class="right-layout">
                <div class="block block-large left">1</div>

                <div class="column right">
                    <div class="block block-small">2</div>
                    <div class="block block-small second-row">3</div>
                </div>
            </div>
        </section>

        <section class="example example-five">
            <div class="center-layout">
                <div class="block block-large left">1</div>

                <div class="column right">
                    <div class="block block-small">2</div>
                    <div class="block block-small second-row">3</div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
